packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  core-js: true
  esbuild: true
  sharp: true
  workerd: true
# Exempt our own scope from the 24h minimum-release-age cooldown (it would
# otherwise block a just-published contrail). Glob so we don't re-add per version.
minimumReleaseAgeExclude:
  - '@atmo-dev/*'
